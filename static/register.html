<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ATS RAG Assistant</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-container">
        <form id="register-form">
            <h2 style="color: #00ff88;">Register</h2>

            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" style="background: #00ff88;">Register</button>
            <p style="margin-top: 20px; font-size: 0.9em; text-align: center; color: #ccc;">
                Already have an account? <a href="/" style="color: #00ff88; text-decoration: none;">Login here</a>
            </p>
        </form>
    </div>
    <script src="/static/register.js"></script>
</body>
</html>
